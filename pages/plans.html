<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans | REMIN, alone in silence</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <a class="brand" href="../index.html">REMIN <span>Game Info</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../index.html">Home</a>
                <a href="screenshots.html">Screenshots</a>
                <a href="plans.html">Plans</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section" id="plans">
            <div class="container">
                <h2>Development Plans</h2>
                <div class="plans-wrapper">
                    <div id="plans-graph" class="plans-graph-container">
                        <canvas id="plans-graph-canvas"></canvas>
                    </div>
                    <div id="plans-list" class="timeline">
                        <div class="timeline-item">
                            <p class="phase">Loading</p>
                            <p>Reading markdown plans...</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <span id="year"></span> REMIN, alone in silence. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const yearEl = document.getElementById('year');
        if (yearEl) {
            yearEl.textContent = new Date().getFullYear();
        }

        const plansListEl = document.getElementById('plans-list');
        const plansDir = '../plans/';
        const plansIndexFile = '../plans/index.json';
        let indexedPlanOrder = [];

        function serialFromFilename(filename) {
            const match = filename.match(/^(\d+)[-_]/);
            return match ? Number.parseInt(match[1], 10) : Number.MAX_SAFE_INTEGER;
        }

        function serialFromMarkdown(markdownText) {
            const match = markdownText.match(/(?:^|\n)\s*Serial\s*:\s*(\d+)\s*(?:\n|$)/i);
            return match ? Number.parseInt(match[1], 10) : null;
        }

        function statusFromMarkdown(markdownText) {
            const match = markdownText.match(/(?:^|\n)\s*Status\s*:\s*([a-zA-Z- ]+)\s*(?:\n|$)/i);
            if (!match) {
                return null;
            }

            const rawStatus = match[1].trim().toLowerCase();
            const normalized = rawStatus.replace(/\s+/g, '-');

            if (normalized === 'done') {
                return { statusClass: 'state-done', label: 'Done' };
            }

            if (normalized === 'in-progress' || normalized === 'active') {
                return { statusClass: 'state-active', label: 'In Progress' };
            }

            if (normalized === 'next' || normalized === 'planned') {
                return { statusClass: 'state-next', label: 'Next' };
            }

            if (normalized === 'cancelled') {
                return { statusClass: 'state-cancelled', label: 'Cancelled' };
            }

            return null;
        }

        function stripMetadataLines(markdownText) {
            return markdownText
                .replace(/^(\s*Serial\s*:\s*\d+\s*)$/gim, '')
                .replace(/^(\s*Status\s*:\s*[a-zA-Z- ]+\s*)$/gim, '')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        function titleFromMarkdown(markdownText, filename) {
            const headingMatch = markdownText.match(/^#\s+(.+)$/m);
            if (headingMatch) {
                return headingMatch[1].trim();
            }

            return filename
                .replace(/^\d+[-_]?/, '')
                .replace(/\.md$/i, '')
                .replace(/[-_]+/g, ' ')
                .replace(/\b\w/g, (char) => char.toUpperCase());
        }

        async function discoverPlanFiles() {
            const discovered = new Set();

            try {
                const response = await fetch(plansIndexFile, { cache: 'no-store' });
                if (response.ok) {
                    const fileList = await response.json();
                    if (Array.isArray(fileList)) {
                        indexedPlanOrder = fileList
                            .filter((fileName) => typeof fileName === 'string' && fileName.toLowerCase().endsWith('.md'));

                        indexedPlanOrder.forEach((fileName) => discovered.add(fileName));
                    }
                }
            } catch (error) {
                console.warn('Unable to read index file order.', error);
            }

            try {
                const response = await fetch(plansDir, { cache: 'no-store' });
                if (response.ok) {
                    const html = await response.text();
                    const regex = /href=["']([^"']+\.md)["']/gi;
                    let match;

                    while ((match = regex.exec(html)) !== null) {
                        const fileName = match[1].split('/').pop();
                        if (fileName) {
                            discovered.add(fileName);
                        }
                    }
                }
            } catch (error) {
                console.warn('Directory listing is unavailable.', error);
            }

            return [...discovered].filter((fileName) => fileName.toLowerCase().endsWith('.md'));
        }

        async function renderPlans() {
            const files = await discoverPlanFiles();

            if (!files.length) {
                plansListEl.innerHTML = `
                    <div class="timeline-item">
                        <p class="phase">No Plans Found</p>
                        <p>Add markdown files in <strong>plans</strong>, for example: <strong>001-vertical-slice.md</strong>.</p>
                    </div>
                `;
                return;
            }

            const entries = await Promise.all(files.map(async (fileName) => {
                const response = await fetch(`${plansDir}${encodeURIComponent(fileName)}`, { cache: 'no-store' });
                if (!response.ok) {
                    return null;
                }

                const markdownText = await response.text();
                const serialFromFile = serialFromFilename(fileName);
                const serialFromBody = serialFromMarkdown(markdownText);
                const serial = Number.isFinite(serialFromBody) ? serialFromBody : serialFromFile;
                const status = statusFromMarkdown(markdownText) || { statusClass: 'state-next', label: 'Next' };
                const title = titleFromMarkdown(markdownText, fileName);
                const cleanMarkdown = stripMetadataLines(markdownText);
                const rendered = window.marked ? window.marked.parse(cleanMarkdown) : `<pre>${cleanMarkdown}</pre>`;

                return {
                    fileName,
                    serial,
                    status,
                    title,
                    rendered
                };
            }));

            const validEntries = entries
                .filter((entry) => entry !== null)
                .sort((first, second) => {
                    const firstIndex = indexedPlanOrder.indexOf(first.fileName);
                    const secondIndex = indexedPlanOrder.indexOf(second.fileName);

                    const firstInIndex = firstIndex !== -1;
                    const secondInIndex = secondIndex !== -1;

                    if (firstInIndex && secondInIndex) {
                        return firstIndex - secondIndex;
                    }

                    if (firstInIndex) {
                        return -1;
                    }

                    if (secondInIndex) {
                        return 1;
                    }

                    const serialDelta = first.serial - second.serial;
                    if (serialDelta !== 0) {
                        return serialDelta;
                    }
                    return first.fileName.localeCompare(second.fileName);
                });

            plansListEl.innerHTML = validEntries.map((entry) => {
                return `
                <article class="timeline-item ${entry.status.statusClass}" data-plan-file="${entry.fileName}">
                    <div class="plan-phase-row">
                        <span class="status-light" aria-hidden="true"></span>
                        <p class="phase">${entry.status.label}</p>
                    </div>
                    <h3>${entry.title}</h3>
                    <div class="plan-md">${entry.rendered}</div>
                </article>
            `;
            }).join('');

            renderGraph(validEntries);
        }

        function renderGraph(entries) {
            const canvas = document.getElementById('plans-graph-canvas');
            const timelineEl = document.getElementById('plans-list');
            if (!canvas || !timelineEl) return;

            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            // Get the actual timeline items to calculate their positions
            const timelineItems = timelineEl.querySelectorAll('.timeline-item');
            const itemPositions = [];
            
            timelineItems.forEach((item) => {
                const rect = item.getBoundingClientRect();
                const timelineRect = timelineEl.getBoundingClientRect();
                const relativeTop = rect.top - timelineRect.top;
                const centerY = relativeTop + rect.height / 2;
                itemPositions.push(centerY);
            });

            // Set canvas dimensions - much narrower
            canvas.width = 60;
            if (itemPositions.length > 0) {
                canvas.height = Math.max(400, itemPositions[itemPositions.length - 1] + 50);
            } else {
                canvas.height = 400;
            }

            // Set background
            ctx.fillStyle = 'transparent';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const dotRadius = 8;
            const lineWidth = 2;

            const colors = {
                'state-done': '#22c55e',
                'state-active': '#ffd400',
                'state-next': '#60a5fa',
                'state-cancelled': '#ef4444'
            };

            // Draw connecting lines
            ctx.strokeStyle = '#3a2a66';
            ctx.lineWidth = lineWidth;
            for (let i = 0; i < itemPositions.length - 1; i++) {
                const y1 = itemPositions[i];
                const y2 = itemPositions[i + 1];
                ctx.beginPath();
                ctx.moveTo(centerX, y1);
                ctx.lineTo(centerX, y2);
                ctx.stroke();
            }

            // Draw dots
            entries.forEach((entry, index) => {
                if (index >= itemPositions.length) return;
                
                const y = itemPositions[index];
                const color = colors[entry.status.statusClass] || '#a7a1d1';

                // Draw dot
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(centerX, y, dotRadius, 0, Math.PI * 2);
                ctx.fill();

                // Draw outer ring for active status
                if (entry.status.statusClass === 'state-active') {
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(centerX, y, dotRadius + 4, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
        }

        // Initial render
        renderPlans();

        // Auto-update every 3 seconds to detect new plans
        setInterval(renderPlans, 3000);
    </script>
</body>
</html>
